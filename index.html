<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {

  font-family: 'Roboto', Arial, sans-serif;
  background: #fff;
  color: #3c4043;
}

.page {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #fff;
  border-right: 1px solid #e8eaed;

.h-title {

.h-badge {

.h-dot {

/* ── Map ── */

.vs-label {

  margin-bottom: 12px;

}

.vs-list {

  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  padding-right: 4px;
}

.vs-list::-webkit-scrollbar { width: 8px; }
.vs-list::-webkit-scrollbar-thumb {
  background: #dadce0;
  border-radius: 4px;
}
.vs-list::-webkit-scrollbar-track { background: transparent; }

.ctag {

  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: #f8f9fa;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  font-size: 14px;
  color: #3c4043;
  transition: background 0.12s, border-color 0.12s;
}

.ctag:hover {
  background: #f1f3f4;
  border-color: #dadce0;
}

.ctag.clickable { cursor: pointer; }

.ctag.active {
  background: #fef3c7;
  border-color: #f59e0b;
  color: #92400e;
  font-weight: 500;
}

.ctag:focus-visible {
  outline: 2px solid #1a73e8;

}

.ctag-flag { font-size: 18px; line-height: 1; }

/* ── Leaflet overrides ── */
.leaflet-control-attribution {
  font-size: 10px !important;
  background: rgba(255,255,255,0.8) !important;

.leaflet-control-attribution a { color: #1a73e8 !important; }

.leaflet-bar a {

.leaflet-bar a:hover { background: #f1f3f4 !important; }

@media (hover: none) and (pointer: coarse) {

.leaflet-tooltip {

  font-weight: 500;
}

  color: #5f6368;
  z-index: 1000;

/* ── Планшеты ── */
@media (max-width: 1024px) {

};

// numeric-3 → ISO alpha-2 (автогенерация из A2N, DRY)
const N2C = Object.fromEntries(
  Object.entries(A2N).map(([code, num]) => [String(parseInt(num, 10)), code])
);

// Центроиды для стран без полигонов в датасете 50m
const CENTROIDS = {
  CY:[34.9,33.0], ME:[42.7,19.4], LK:[7.9,80.7], SG:[1.3,103.8],
  BH:[26.0,50.5], MT:[35.9,14.5], MV:[3.2,73.2], MU:[-20.3,57.6],
  LI:[47.1,9.5],  SM:[43.9,12.5], MC:[43.7,7.4],  AD:[42.5,1.5],
  BB:[13.2,-59.6], SC:[-4.7,55.5], KN:[17.3,-62.7], LC:[13.9,-61.0],
  VC:[13.3,-61.2], GD:[12.1,-61.7], DM:[15.4,-61.4], AG:[17.1,-61.8],
  TO:[-21.2,-175.2], TV:[-8.5,179.2], NR:[-0.5,166.9], PW:[7.5,134.6],
  MH:[7.1,171.2], KI:[1.9,-157.4], FM:[6.9,158.2], WS:[-13.6,-172.5],
  SB:[-9.6,160.2], VU:[-15.4,166.9],
};

/* ================================================================
   UTILS — чистые функции, без side-эффектов (SRP)
   ================================================================ */

// Нормализация topojson ID: "040" → "40"
const nid = id => String(parseInt(id, 10));

// Emoji-флаг из ISO alpha-2
const flag = code =>
  [...code.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join("");

// Получить название страны по alpha-2 коду
const countryName = code => {
  const num = A2N[code];
  return num ? (N2A[num] || code) : code;
};

/* ================================================================
   STATE — посещённые страны
   ================================================================ */

const visitedSet = new Set(
  CONFIG.visited.map(c => nid(A2N[c.toUpperCase()] || 0)).filter(v => v !== "0")
);

/* ================================================================
   SIDEBAR — рендер списка (SRP: только UI сайдбара)
   ================================================================ */

function renderSidebar() {
  document.getElementById("hTitle").textContent = CONFIG.title;

  if (!visitedSet.size) return;

  document.getElementById("hBadge").style.display = "flex";
  document.getElementById("hCount").textContent = visitedSet.size;
  document.getElementById("visitedSection").style.display = "flex";

  const list = document.getElementById("visitedList");

  for (const code of CONFIG.visited) {
    const tag = document.createElement("div");
    tag.className = "ctag";
    tag.dataset.code = code.toUpperCase();
    tag.setAttribute("role", "button");
    tag.setAttribute("tabindex", "0");
    tag.setAttribute("aria-label", countryName(code));

    const flagSpan = document.createElement("span");
    flagSpan.className = "ctag-flag";
    flagSpan.textContent = flag(code);

    tag.appendChild(flagSpan);
    tag.appendChild(document.createTextNode(countryName(code)));
    list.appendChild(tag);
  }
}

renderSidebar();

/* ================================================================
   MAP — инициализация карты (SRP: только карта)
   ================================================================ */

const map = L.map("map", {
  minZoom: 0, maxZoom: 8, zoomControl: true, zoomSnap: 0.25,
  worldCopyJump: false,
  maxBounds: [[-85, -180], [85, 180]],
  maxBoundsViscosity: 1.0,
  attributionControl: false,
});

// Начальный зум + адаптация при ресайзе (без сброса вида)
let _mapInitialized = false;
let _resizeTimer;

function fitWorld() {
  const isFirst = !_mapInitialized;
  _mapInitialized = true;

  map.invalidateSize(false);
  const isMobile = window.matchMedia("(max-width: 700px)").matches;
  const z = Math.log2(map.getSize().x / 256) + (isMobile ? 1 : 0);
  map.setMinZoom(z);

  if (isFirst) map.setView([20, 0], z, { animate: false });
}

setTimeout(fitWorld, 100);
window.addEventListener("resize", () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(fitWorld, 150);
});

L.control.attribution({ prefix: false })
  .addAttribution(
    '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>' +
    ' &copy; <a href="https://carto.com/">CARTO</a>'
  )
  .addTo(map);

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
  { subdomains: "abcd", maxZoom: 19, noWrap: true, bounds: [[-85, -180], [85, 180]] }
).addTo(map);

/* ================================================================
   STYLES — палитра и стили слоёв
   ================================================================ */

const STYLE = {
  visited:  { fillColor: "#34d399", fillOpacity: 0.4, color: "#059669", weight: 1.5 },
  selected: { fillColor: "#f59e0b", fillOpacity: 0.5, color: "#b45309", weight: 2.5 },
  hover:    { fillColor: "#1a73e8", fillOpacity: 0.18, color: "#1a73e8", weight: 1 },
  clear:    { fillColor: "transparent", fillOpacity: 0, color: "transparent", weight: 0 },
};

/* ================================================================
   GEO — загрузка и обработка топологии
   ================================================================ */

function fixAntimeridian(ring) {
  for (let i = 1; i < ring.length; i++) {
    while (ring[i][0] - ring[i - 1][0] > 180)  ring[i][0] -= 360;
    while (ring[i - 1][0] - ring[i][0] > 180)  ring[i][0] += 360;
  }
}

function fixGeometry(feature) {
  if (!feature.geometry) return;
  const coords = feature.geometry.coordinates;
  if (feature.geometry.type === "Polygon")      coords.forEach(fixAntimeridian);
  if (feature.geometry.type === "MultiPolygon") coords.forEach(p => p.forEach(fixAntimeridian));
}

function addHoverLayer(geojson) {
  L.geoJSON(geojson, {
    style: STYLE.clear,
    onEachFeature(feature, layer) {
      const id   = nid(feature.id);
      const name = N2A[id];
      if (!name) return;

      const visited = visitedSet.has(id);

      layer.bindTooltip(
        visited ? "\u2713 " + name : name,
        { sticky: true, className: visited ? "visited-tooltip" : "" }
      );

      if (visited) return; // hover только для непосещённых

      layer.on({
        mouseover: e => { e.target.setStyle(STYLE.hover); e.target.bringToFront(); },
        mouseout:  e => e.target.setStyle(STYLE.clear),
      });
    },
  }).addTo(map);
}

function addVisitedLayer(geojson) {
  const visitedFeatures = {
    type: "FeatureCollection",
    features: geojson.features.filter(f => visitedSet.has(nid(f.id))),
  };

  const layerByCode = {};

  const visitedLayer = L.geoJSON(visitedFeatures, {
    style: STYLE.visited,
    onEachFeature(feature, layer) {
      const code = N2C[nid(feature.id)];
      if (code) layerByCode[code] = layer;
    },
  }).addTo(map);

  return layerByCode;
}

/* ================================================================
   INTERACTION — клики по списку стран
   ================================================================ */

function bindCountryClicks(layerByCode) {
  let selectedLayer = null;

  document.querySelectorAll("#visitedList .ctag").forEach(tag => {
    const code     = tag.dataset.code;
    const layer    = layerByCode[code];
    const centroid = CENTROIDS[code];
    if (!layer && !centroid) return;

    tag.classList.add("clickable");

    tag.addEventListener("click", () => {
      // Сброс предыдущего выделения
      if (selectedLayer) selectedLayer.setStyle(STYLE.visited);
      document.querySelectorAll("#visitedList .ctag.active")
        .forEach(t => t.classList.remove("active"));
      tag.classList.add("active");

      if (layer) {
        layer.setStyle(STYLE.selected);
        layer.bringToFront();
        selectedLayer = layer;
        map.flyToBounds(layer.getBounds(), { padding: [40, 40], maxZoom: 6, duration: 0.6 });
      } else {
        selectedLayer = null;
        map.flyTo(centroid, 6, { duration: 0.6 });
      }
    });
  });
}

/* ================================================================
   BOOT — загрузка данных и сборка
   ================================================================ */

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
  .then(r => r.json())
  .then(world => {
    document.getElementById("loadMsg").style.display = "none";

    const geojson = topojson.feature(world, world.objects.countries);

    // Фикс геометрии
    geojson.features.forEach(fixGeometry);

    // Слои
    addHoverLayer(geojson);
    const layerByCode = addVisitedLayer(geojson);
    bindCountryClicks(layerByCode);
  })
  .catch(() => {
    document.getElementById("loadMsg").textContent = "Ошибка загрузки. Проверьте соединение.";
  });
</script>
