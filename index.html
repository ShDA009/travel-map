* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Roboto', Arial, sans-serif;
  background: #fff;
  color: #3c4043;
}

.page {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #fff;
  border-right: 1px solid #e8eaed;

  z-index: 5;

.h-title {
  font-size: 1.15rem;
  font-weight: 500;
  color: #202124;
  letter-spacing: 0.01em;
  margin-bottom: 16px;
}

.h-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  background: #e8f0fe;
  border: 1px solid #c2d7fb;
  border-radius: 20px;
  padding: 6px 16px 6px 12px;
  font-size: 13px;
  color: #1a73e8;
  font-weight: 500;
  margin-bottom: 22px;
}

.h-dot {

/* ── Map ── */
#map {

.leaflet-container { background: #aadaff; }

/* ── Visited list ── */
.visited-section {

  min-height: 0;
  flex: 1;
}

.vs-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #80858d;
  margin-bottom: 12px;
  font-weight: 500;
}

.vs-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  padding-right: 4px;
}

.vs-list::-webkit-scrollbar { width: 8px; }
.vs-list::-webkit-scrollbar-thumb {
  background: #dadce0;
  border-radius: 4px;
}
.vs-list::-webkit-scrollbar-track { background: transparent; }

.ctag {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: #f8f9fa;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  font-size: 14px;
  color: #3c4043;
  transition: background 0.12s, border-color 0.12s;
}

.ctag:hover {
  background: #f1f3f4;
  border-color: #dadce0;
}

.ctag.clickable { cursor: pointer; }

.ctag.active {
  background: #fef3c7;
  border-color: #f59e0b;
  color: #92400e;
  font-weight: 500;
}

.ctag-flag { font-size: 18px; line-height: 1; }

/* ── Leaflet overrides ── */
.leaflet-control-attribution {
  font-size: 10px !important;
  background: rgba(255,255,255,0.8) !important;
  color: #5f6368 !important;
}
.leaflet-control-attribution a { color: #1a73e8 !important; }

.leaflet-bar a {
  background: #fff !important;
  color: #3c4043 !important;
  border-bottom-color: #e8eaed !important;
}
.leaflet-bar a:hover { background: #f1f3f4 !important; }

/* Крупные кнопки зума для тача */

    line-height: 40px !important;

.leaflet-tooltip {

  border-radius: 4px;
  padding: 5px 12px;
  font-family: 'Roboto', Arial, sans-serif;
  font-size: 13px;
  color: #3c4043;

  color: #1a73e8;
  font-weight: 500;
}

.loading-msg {
  position: absolute;
  top: 50%; left: 50%;

  font-size: 13px;
  color: #5f6368;
  z-index: 1000;
  pointer-events: none;

/* ── Планшеты: более узкий сайдбар ── */
@media (max-width: 1024px) {
  .page { grid-template-columns: 240px 1fr; }

/* ── Телефоны: сайдбар снизу, карта сверху ── */
@media (max-width: 700px) {
  .page {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }
  /* явно: карта в верхней строке, сайдбар в нижней (в DOM сайдбар идёт первым) */
  #map     { grid-row: 1; min-height: 0; }
  .sidebar { grid-row: 2; }
  .sidebar {
    border-right: none;
    border-top: 1px solid #e8eaed;

  .vs-list {

    flex-wrap: wrap;

    padding-right: 0;
    overflow-y: auto;
  }
  .ctag {

    border-radius: 16px;

@media (max-width: 380px) {

    padding: 12px;

  [...code.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join("");

// ── DOM ───────────────────────────────────────────────────────────────────────

    .map(c => String(parseInt(A2N[c.toUpperCase()] || 0, 10)))

  minZoom: 0,
  maxZoom: 8,
  zoomControl: true,

  worldCopyJump: false,

});

// Заполнить всю область карты, центр по середине мира; вписываем по большей стороне
let _fitWorldInitial = true;
let _fitWorldTimer = null;
function fitWorld() {
  const isFirst = _fitWorldInitial;
  _fitWorldInitial = false;
  // пересчитать реальный размер контейнера (важно после смены раскладки/поворота)
  map.invalidateSize(false);
  // Зум, при котором весь мир по ШИРИНЕ влезает в контейнер.
  // (на узких/высоких экранах это даёт меньший зум, чем вписывание по высоте)
  const containerW = map.getSize().x;
  const z = Math.log2(containerW / 256);               // мир по ширине
  map.setMinZoom(z);
  if (isFirst) {
    map.setView([20, 0], z, { animate: false });
  }
}
setTimeout(fitWorld, 100);
window.addEventListener("resize", () => {
  clearTimeout(_fitWorldTimer);
  _fitWorldTimer = setTimeout(fitWorld, 150);
});
window.addEventListener("orientationchange", () => {
  clearTimeout(_fitWorldTimer);
  _fitWorldTimer = setTimeout(fitWorld, 250);
});

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
  .then(r => r.json())
  .then(world => {
    document.getElementById("loadMsg").style.display = "none";

    const geojson = topojson.feature(world, world.objects.countries);

    // Фикс антимеридиана: нормализация каждой точки кольца относительно предыдущей
    function fixRing(ring) {
      for (let i = 1; i < ring.length; i++) {
        while (ring[i][0] - ring[i-1][0] > 180)  ring[i][0] -= 360;
        while (ring[i-1][0] - ring[i][0] > 180)  ring[i][0] += 360;
      }
    }
    geojson.features.forEach(f => {
      if (!f.geometry) return;
      const type = f.geometry.type;
      const coords = f.geometry.coordinates;
      if (type === "Polygon")      coords.forEach(fixRing);
      if (type === "MultiPolygon") coords.forEach(poly => poly.forEach(fixRing));
    });

    // Прозрачный слой всех стран — только для hover/tooltip (тайлы видны под ним)
    L.geoJSON(geojson, {
      style: {
        fillColor: "transparent",
        fillOpacity: 0,
        color: "transparent",
        weight: 0,
      },
      onEachFeature(feature, layer) {
        const id   = String(parseInt(feature.id, 10));
        const name = N2N[id];
        if (!name) return;

        const isVisited = visitedSet.has(id);

        layer.bindTooltip(
          isVisited ? "✓ " + name : name,
          { sticky: true, className: isVisited ? "visited-tooltip" : "" }
        );

        layer.on({
          mouseover(e) {
            if (!isVisited) {
              e.target.setStyle({ fillColor: "#1a73e8", fillOpacity: 0.18, color: "#1a73e8", weight: 1 });
              e.target.bringToFront();
            }
          },
          mouseout(e) {
            if (!isVisited) {
              e.target.setStyle({ fillColor: "transparent", fillOpacity: 0, color: "transparent", weight: 0 });
            }
          },
        });
      },
    }).addTo(map);

    // Зелёный слой только для посещённых стран
    const visitedFeatures = {
      type: "FeatureCollection",
      features: geojson.features.filter(f => visitedSet.has(String(parseInt(f.id, 10)))),
    };

    // ISO alpha-2 → слой посещённой страны
    const layerByCode = {};
    // строим обратный маппинг: числовой id → ISO alpha-2
    const numToCode = {};
    // feature.id может быть "040" (с ведущим нулём), A2N хранит "40" — нормализуем оба
    Object.entries(A2N).forEach(([code, num]) => {
      numToCode[String(parseInt(num, 10))] = code;
    });

    const visitedGeoJSON = L.geoJSON(visitedFeatures, {
      style: visitedStyle,
      onEachFeature(feature, layer) {
        const code = numToCode[String(parseInt(feature.id, 10))];
        if (code) layerByCode[code] = layer;
      },
    }).addTo(map);

    // ── Клик по стране в списке: центрировать + выделить ──
    let selectedLayer = null;
    document.querySelectorAll("#visitedList .ctag").forEach(tag => {
      const code     = tag.dataset.code;
      const layer    = layerByCode[code];
      const centroid = CENTROIDS[code];
      if (!layer && !centroid) return;
      tag.classList.add("clickable");
      tag.addEventListener("click", () => {
        if (selectedLayer) selectedLayer.setStyle(visitedStyle);
        document.querySelectorAll("#visitedList .ctag.active")
          .forEach(t => t.classList.remove("active"));
        tag.classList.add("active");

        if (layer) {
          layer.setStyle(selectedStyle);
          layer.bringToFront();
          selectedLayer = layer;
          map.flyToBounds(layer.getBounds(), { padding: [40, 40], maxZoom: 6, duration: 0.6 });
        } else {
          // страна мелкая, нет полигона — просто центрируем по координатам
          selectedLayer = null;
          map.flyTo(centroid, 6, { duration: 0.6 });
        }
      });
    });
  })
  .catch(() => {
    document.getElementById("loadMsg").textContent = "Ошибка загрузки. Проверьте соединение.";
  });
</script>
</body>
</html>
