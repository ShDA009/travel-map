<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта путешествий</title>

<!-- ============================================================
     КОНФИГ - редактировать только здесь
     Коды стран: ISO 3166-1 alpha-2 (двухбуквенные)
     Примеры: RU=Россия, DE=Германия, FR=Франция, JP=Япония
     Полный список: https://www.iban.com/country-codes
     ============================================================ -->
<script>
const CONFIG = {
  title:        "Мои путешествия",
  visited:      ["RU", "DE", "FR", "JP", "US", "TR", "TH"],
  visitedColor: "#6ee7b7",   // цвет посещённых стран
  hoverColor:   "#34d399",   // цвет при наведении
  landColor:    "#d1d5db",   // цвет непосещённых стран
  oceanColor:   "#bfdbfe",   // цвет океана
};
</script>
<!-- ============================================================ -->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0f172a;
    color: #f8fafc;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #e2e8f0;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #64748b;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .counter {
    display: inline-block;
    color: #6ee7b7;
    font-variant-numeric: tabular-nums;
  }

  .map-wrap {
    width: 100%;
    max-width: 1100px;
    border: 1px solid #1e293b;
    border-radius: 4px;
    overflow: hidden;
    background: #bfdbfe;
    position: relative;
  }

  svg {
    display: block;
    width: 100%;
    aspect-ratio: 960 / 500;
  }

  .country {
    cursor: default;
    transition: fill 0.15s;
    stroke: #fff;
    stroke-width: 0.4;
  }

  .tooltip {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.88);
    color: #f1f5f9;
    padding: 5px 16px;
    border-radius: 3px;
    font-size: 13px;
    font-family: 'Georgia', serif;
    letter-spacing: 0.04em;
    pointer-events: none;
    white-space: nowrap;
    display: none;
    border-left: 3px solid #6ee7b7;
  }

  .tooltip.visited-tip {
    border-left-color: #6ee7b7;
  }

  .visited-list {
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    padding: 4px 12px;
    border: 1px solid #1e3a2f;
    border-radius: 2px;
    font-size: 12px;
    color: #6ee7b7;
    background: #0d2118;
    letter-spacing: 0.06em;
    font-family: 'Georgia', serif;
  }

  .loading {
    padding: 80px;
    text-align: center;
    color: #475569;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1 id="map-title"></h1>
<div class="subtitle">
  Посещено: <span class="counter" id="count">0</span> стран
</div>

<div class="map-wrap" id="map-wrap">
  <div class="loading" id="loading">Загрузка карты...</div>
  <svg id="map" style="display:none" viewBox="0 0 960 500"></svg>
  <div class="tooltip" id="tooltip"></div>
</div>

<div class="visited-list" id="visited-list"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

  MG:"450",MW:"454",MY:"458",MV:"462",ML:"466",MT:"470",MH:"584",MQ:"474",
  MR:"478",MU:"480",YT:"175",MX:"484",FM:"583",MD:"498",MC:"492",MN:"496",
  ME:"499",MS:"500",MA:"504",MZ:"508",MM:"104",NA:"516",NR:"520",NP:"524",
  NL:"528",NC:"540",NZ:"554",NI:"558",NE:"562",NG:"566",NU:"570",NF:"574",
  MK:"807",MP:"580",NO:"578",OM:"512",PK:"586",PW:"585",PS:"275",PA:"591",
  PG:"598",PY:"600",PE:"604",PH:"608",PN:"612",PL:"616",PT:"620",PR:"630",
  QA:"634",RE:"638",RO:"642",RU:"643",RW:"646",BL:"652",SH:"654",KN:"659",
  LC:"662",MF:"663",PM:"666",VC:"670",WS:"882",SM:"674",ST:"678",SA:"682",
  SN:"686",RS:"688",SC:"690",SL:"694",SG:"702",SX:"534",SK:"703",SI:"705",
  SB:"90",SO:"706",ZA:"710",GS:"239",SS:"728",ES:"724",LK:"144",SD:"729",

  WF:"876",EH:"732",YE:"887",ZM:"894",ZW:"716",KX:"412",XK:"383"

// Маппинг numeric -> название (для тултипа)
const NUMERIC_TO_NAME = {
  "4":"Afghanistan","8":"Albania","12":"Algeria","16":"American Samoa","20":"Andorra",
  "24":"Angola","28":"Antigua and Barbuda","32":"Argentina","36":"Australia","40":"Austria",
  "31":"Azerbaijan","44":"Bahamas","48":"Bahrain","50":"Bangladesh","52":"Barbados",
  "112":"Belarus","56":"Belgium","84":"Belize","204":"Benin","64":"Bhutan",
  "68":"Bolivia","70":"Bosnia and Herzegovina","72":"Botswana","76":"Brazil",
  "96":"Brunei","100":"Bulgaria","854":"Burkina Faso","108":"Burundi","132":"Cape Verde",
  "116":"Cambodia","120":"Cameroon","124":"Canada","140":"Central African Republic",
  "148":"Chad","152":"Chile","156":"China","170":"Colombia","174":"Comoros",
  "178":"Congo","180":"DR Congo","188":"Costa Rica","384":"Ivory Coast","191":"Croatia",
  "192":"Cuba","196":"Cyprus","203":"Czech Republic","208":"Denmark","262":"Djibouti",
  "212":"Dominica","214":"Dominican Republic","218":"Ecuador","818":"Egypt",
  "222":"El Salvador","226":"Equatorial Guinea","232":"Eritrea","233":"Estonia",
  "748":"Eswatini","231":"Ethiopia","242":"Fiji","246":"Finland","250":"France",
  "266":"Gabon","270":"Gambia","268":"Georgia","276":"Germany","288":"Ghana",
  "300":"Greece","308":"Grenada","320":"Guatemala","324":"Guinea","624":"Guinea-Bissau",
  "328":"Guyana","332":"Haiti","336":"Vatican","340":"Honduras","348":"Hungary",
  "352":"Iceland","356":"India","360":"Indonesia","364":"Iran","368":"Iraq",
  "372":"Ireland","376":"Israel","380":"Italy","388":"Jamaica","392":"Japan",
  "400":"Jordan","398":"Kazakhstan","404":"Kenya","296":"Kiribati","408":"North Korea",
  "410":"South Korea","414":"Kuwait","417":"Kyrgyzstan","418":"Laos","428":"Latvia",
  "422":"Lebanon","426":"Lesotho","430":"Liberia","434":"Libya","438":"Liechtenstein",
  "440":"Lithuania","442":"Luxembourg","450":"Madagascar","454":"Malawi","458":"Malaysia",
  "462":"Maldives","466":"Mali","470":"Malta","584":"Marshall Islands","478":"Mauritania",
  "480":"Mauritius","484":"Mexico","583":"Micronesia","498":"Moldova","492":"Monaco",
  "496":"Mongolia","499":"Montenegro","504":"Morocco","508":"Mozambique","104":"Myanmar",
  "516":"Namibia","520":"Nauru","524":"Nepal","528":"Netherlands","554":"New Zealand",
  "558":"Nicaragua","562":"Niger","566":"Nigeria","807":"North Macedonia","578":"Norway",

  "598":"Papua New Guinea","600":"Paraguay","604":"Peru","608":"Philippines",
  "616":"Poland","620":"Portugal","634":"Qatar","642":"Romania","643":"Russia",
  "646":"Rwanda","659":"Saint Kitts and Nevis","662":"Saint Lucia",
  "670":"Saint Vincent and the Grenadines","882":"Samoa","674":"San Marino",
  "678":"São Tomé and Príncipe","682":"Saudi Arabia","686":"Senegal","688":"Serbia",

  "804":"Ukraine","784":"United Arab Emirates","826":"United Kingdom","840":"United States",
  "858":"Uruguay","860":"Uzbekistan","548":"Vanuatu","862":"Venezuela","704":"Vietnam",
  "887":"Yemen","894":"Zambia","716":"Zimbabwe","732":"Western Sahara","158":"Taiwan",
  "383":"Kosovo","412":"Kosovo"
};

// Инициализация
document.getElementById("map-title").textContent = CONFIG.title;
document.querySelector(".map-wrap").style.background = CONFIG.oceanColor;

const visitedSet = new Set(
  CONFIG.visited.map(code => ALPHA2_TO_NUMERIC[code.toUpperCase()]).filter(Boolean)
);

document.getElementById("count").textContent = visitedSet.size;

// Список стран под картой
const listEl = document.getElementById("visited-list");
CONFIG.visited.forEach(code => {
  const num = ALPHA2_TO_NUMERIC[code.toUpperCase()];
  const name = num ? (NUMERIC_TO_NAME[num] || code) : code;
  const tag = document.createElement("div");
  tag.className = "tag";
  tag.textContent = name;
  listEl.appendChild(tag);
});

// Карта
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {
    document.getElementById("loading").style.display = "none";
    const svgEl = document.getElementById("map");
    svgEl.style.display = "block";

    const svg = d3.select("#map");
    const tooltip = document.getElementById("tooltip");

    const projection = d3.geoNaturalEarth1()
      .scale(153)
      .translate([480, 250]);

    const path = d3.geoPath().projection(projection);
    const features = topojson.feature(world, world.objects.countries).features;

    svg.append("rect")
      .attr("width", 960).attr("height", 500)
      .attr("fill", CONFIG.oceanColor);

    svg.selectAll("path")
      .data(features)
      .join("path")
      .attr("class", "country")
      .attr("d", path)
      .attr("fill", d => visitedSet.has(String(d.id)) ? CONFIG.visitedColor : CONFIG.landColor)
      .on("mouseover", function(event, d) {
        const id = String(d.id);
        const isVisited = visitedSet.has(id);
        d3.select(this).attr("fill", isVisited ? CONFIG.hoverColor : "#b0b6be");
        const name = NUMERIC_TO_NAME[id] || "";
        if (name) {
          tooltip.textContent = isVisited ? "✓ " + name : name;
          tooltip.className = "tooltip" + (isVisited ? " visited-tip" : "");
          tooltip.style.display = "block";
        }
      })
      .on("mouseout", function(event, d) {
        const id = String(d.id);
        d3.select(this).attr("fill", visitedSet.has(id) ? CONFIG.visitedColor : CONFIG.landColor);
        tooltip.style.display = "none";
      });
  })
  .catch(() => {
    document.getElementById("loading").textContent = "Ошибка загрузки карты. Проверьте соединение.";
  });
</script>
</body>
</html>
