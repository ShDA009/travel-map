<!-- v2 | единая карта, переключение только сайдбара -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Карта путешествий</title>
<link rel="preconnect" href="https://unpkg.com"/>
<link rel="preconnect" href="https://cdnjs.cloudflare.com"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Roboto', Arial, sans-serif;
  background: #fff;
  color: #3c4043;
}

.page {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #fff;
  border-right: 1px solid #e8eaed;
  box-shadow: 2px 0 8px rgba(0,0,0,0.04);
  padding: 22px 20px;
  z-index: 5;
}

/* ── Tab switcher ── */
.tab-switcher {
  display: flex;
  margin: -22px -20px 16px;
  border-bottom: 1px solid #e8eaed;
}

.tab-btn {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: #5f6368;
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  cursor: pointer;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
}

.tab-btn:hover { color: #202124; background: #f8f9fa; }

.tab-active {
  color: #1a73e8;
  font-weight: 500;
  border-bottom-color: #1a73e8;
}

/* ── Header ── */
.h-title {
  font-size: 1.15rem;
  font-weight: 500;
  color: #202124;
  letter-spacing: 0.01em;
  margin-bottom: 16px;
}

.h-badge {
  display: none;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  background: #e8f0fe;
  border: 1px solid #c2d7fb;
  border-radius: 20px;
  padding: 6px 16px 6px 12px;
  font-size: 13px;
  color: #1a73e8;
  font-weight: 500;
  margin-bottom: 22px;
}

.h-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #1a73e8;
  flex-shrink: 0;
}

/* ── Visited list ── */
.visited-section {
  display: none;
  flex-direction: column;
  min-height: 0;
  flex: 1;
}

.vs-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #80858d;
  margin-bottom: 12px;
  font-weight: 500;
}

.vs-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  padding-right: 4px;
}

.vs-list::-webkit-scrollbar { width: 8px; }
.vs-list::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
.vs-list::-webkit-scrollbar-track { background: transparent; }

.ctag {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: #f8f9fa;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  font-size: 14px;
  color: #3c4043;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s, border-color 0.12s;
}

.ctag:hover { background: #f1f3f4; border-color: #dadce0; }

.ctag.active {
  background: #fef3c7;
  border-color: #f59e0b;
  color: #92400e;
  font-weight: 500;
}

.ctag:focus-visible { outline: 2px solid #1a73e8; outline-offset: 1px; }

.ctag-flag { font-size: 18px; line-height: 1; }
.ctag-icon { font-size: 15px; line-height: 1; }

/* ── Map ── */
#map {
  height: 100%;
  background: #aadaff;
  position: relative;
}
.leaflet-container { background: #aadaff; }

/* ── Leaflet overrides ── */
.leaflet-control-attribution {
  font-size: 10px !important;
  background: rgba(255,255,255,0.8) !important;
  color: #5f6368 !important;
}
.leaflet-control-attribution a { color: #1a73e8 !important; }

.leaflet-bar a {
  background: #fff !important;
  color: #3c4043 !important;
  border-bottom-color: #e8eaed !important;
}
.leaflet-bar a:hover { background: #f1f3f4 !important; }

@media (hover: none) and (pointer: coarse) {
  .leaflet-bar a { width: 40px !important; height: 40px !important; line-height: 40px !important; font-size: 22px !important; }
}

.leaflet-tooltip {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 4px;
  padding: 5px 12px;
  font-family: 'Roboto', Arial, sans-serif;
  font-size: 13px;
  color: #3c4043;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  pointer-events: none;
}
.leaflet-tooltip::before { display: none; }
.leaflet-tooltip.visited-tooltip { border-left: 3px solid #1a73e8; color: #1a73e8; font-weight: 500; }

.loading-msg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 13px; color: #5f6368;
  z-index: 1000; pointer-events: none;
}

/* ── Планшеты ── */
@media (max-width: 1024px) {
  .page { grid-template-columns: 240px 1fr; }
  .sidebar { padding: 18px 16px; }
  .ctag { padding: 7px 10px; font-size: 13px; }
}

/* ── Телефоны: сайдбар снизу ── */
@media (max-width: 700px) {
  .page { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  #map     { grid-row: 1; min-height: 0; }
  .sidebar { grid-row: 2; border-right: none; border-top: 1px solid #e8eaed;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    max-height: 32vh; }
  .tab-switcher { margin: -12px -14px 10px; }
  .h-title { font-size: 1rem; margin-bottom: 6px; }
  .h-badge { margin-bottom: 10px; padding: 5px 14px 5px 10px; }
  .vs-label { margin-bottom: 8px; }
  .vs-list { flex-direction: row; flex-wrap: wrap; gap: 6px; padding-right: 0; overflow-y: auto; }
  .ctag { width: auto; padding: 6px 12px; border-radius: 16px; font-size: 13px; }
}

/* ── Узкие телефоны ── */
@media (max-width: 380px) {
  .sidebar { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
  .ctag { font-size: 12.5px; padding: 7px 12px; gap: 8px; }
  .ctag-flag { font-size: 16px; }
}

/* ── Телефон в ландшафте ── */
@media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
  .page { grid-template-columns: 200px 1fr; grid-template-rows: 1fr; }
  #map     { grid-row: auto; grid-column: 2; }
  .sidebar { grid-row: auto; grid-column: 1; border-right: 1px solid #e8eaed; border-top: none;
    box-shadow: 2px 0 8px rgba(0,0,0,0.04); max-height: none; padding: 12px; }
  .vs-list { flex-direction: column; }
  .ctag { width: 100%; border-radius: 8px; }
}
</style>
</head>

<body>
<div class="page">
  <aside class="sidebar">
    <div class="tab-switcher" id="tabSwitcher"></div>
    <div class="h-title" id="hTitle"></div>
    <div class="h-badge" id="hBadge">
      <div class="h-dot"></div>
      <span id="hCount"></span>&nbsp;из&nbsp;<span id="hTotal"></span>&nbsp;<span id="hCountLabel"></span>
    </div>
    <div class="visited-section" id="visitedSection">
      <div class="vs-label" id="vsLabel"></div>
      <div class="vs-list" id="visitedList"></div>
    </div>
  </aside>
  <div id="map">
    <div class="loading-msg" id="loadMsg">Загрузка карты...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
/* ================================================================
   TABS
   ================================================================ */

const TABS = [
  { mode: "world",  emoji: "🌍", label: "Мир"     },
  { mode: "russia", emoji: "🇷🇺", label: "Россия" },
];

let activeMode = new URLSearchParams(location.search).get("mode") || "world";

function renderTabs() {
  const container = document.getElementById("tabSwitcher");
  container.innerHTML = "";
  TABS.forEach(tab => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (tab.mode === activeMode ? " tab-active" : "");
    btn.textContent = tab.emoji + " " + tab.label;
    btn.addEventListener("click", () => showMode(tab.mode));
    container.appendChild(btn);
  });
}

/* ================================================================
   UTILS
   ================================================================ */

const nid = id => String(parseInt(id, 10));
const flag = code => [...code.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join("");
const countryName = code => { const n = MAP_CONFIG.A2N[code]; return n ? (MAP_CONFIG.N2A[n] || code) : code; };

const N2C = Object.fromEntries(Object.entries(MAP_CONFIG.A2N).map(([c, n]) => [String(parseInt(n, 10)), c]));

function fixAntimeridian(ring) {
  for (let i = 1; i < ring.length; i++) {
    while (ring[i][0] - ring[i-1][0] >  180) ring[i][0] -= 360;
    while (ring[i-1][0] - ring[i][0] >  180) ring[i][0] += 360;
  }
}
function fixGeometry(f) {
  if (!f.geometry) return;
  const c = f.geometry.coordinates;
  if (f.geometry.type === "Polygon")      c.forEach(fixAntimeridian);
  if (f.geometry.type === "MultiPolygon") c.forEach(p => p.forEach(fixAntimeridian));
}

function makeEmojiIcon(size) {
  return L.divIcon({
    html: `<span style="font-size:${size}px;line-height:1;display:block;">📍</span>`,
    className: "", iconSize: [size, size], iconAnchor: [size/2, size], tooltipAnchor: [0, -size],
  });
}
const PIN_VISITED  = makeEmojiIcon(18);
const PIN_SELECTED = makeEmojiIcon(22);

/* ================================================================
   STYLES
   ================================================================ */

const STYLE = {
  countryVisited:  { fillColor: "#34d399", fillOpacity: 0.4,  color: "#059669", weight: 1.5 },
  countrySelected: { fillColor: "#f59e0b", fillOpacity: 0.5,  color: "#b45309", weight: 2.5 },
  countryHover:    { fillColor: "#1a73e8", fillOpacity: 0.18, color: "#1a73e8", weight: 1   },
  countryClear:    { fillColor: "#000", fillOpacity: 0.001, color: "#aaa", weight: 0.3 },
  regionBase:      { fillColor: "transparent", fillOpacity: 0,    color: "#aaa",    weight: 0.4 },
  regionVisited:   { fillColor: "#2d9e75",     fillOpacity: 0.30, color: "#1a7a5a", weight: 1   },
  regionSelected:  { fillColor: "#f59e0b",     fillOpacity: 0.45, color: "#b45309", weight: 1.5 },
  regionHover:     { fillColor: "#1a73e8",     fillOpacity: 0.18, color: "#1a73e8", weight: 1   },
};

/* ================================================================
   MAP
   ================================================================ */

const map = L.map("map", {
  minZoom: 0, maxZoom: 10, zoomControl: true, zoomSnap: 0.25,
  worldCopyJump: false,
  maxBounds: [[-85,-180],[85,180]],
  maxBoundsViscosity: 1.0,
  attributionControl: false,
});

let _mapInit = false, _resizeTimer;
function fitView() {
  const isFirst = !_mapInit; _mapInit = true;
  map.invalidateSize(false);
  const isMobile = window.matchMedia("(max-width: 700px)").matches;
  const z = Math.log2(map.getSize().x / 256) + (isMobile ? 1 : 0);
  map.setMinZoom(z);
  if (isFirst) map.setView([20, 0], z, { animate: false });
}
setTimeout(fitView, 100);
window.addEventListener("resize", () => { clearTimeout(_resizeTimer); _resizeTimer = setTimeout(fitView, 150); });

L.control.attribution({ prefix: false })
  .addAttribution('&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>')
  .addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
  { subdomains: "abcd", maxZoom: 19, noWrap: true, bounds: [[-85,-180],[85,180]] }).addTo(map);

let _hoveredLayer = null;

function hoverEnter(layer, style) {
  if (_hoveredLayer && _hoveredLayer !== layer) hoverLeave(_hoveredLayer);
  _hoveredLayer = layer;
  layer.setStyle(style);
}

function hoverLeave(layer, restoreStyle) {
  if (restoreStyle !== undefined) layer.setStyle(restoreStyle);
  layer.closeTooltip();
  if (_hoveredLayer === layer) _hoveredLayer = null;
}

map.on("mouseout", () => { if (_hoveredLayer) hoverLeave(_hoveredLayer); });
map.on("mousemove", e => {
  if (_hoveredLayer && !e.originalEvent.target.closest(".leaflet-interactive")) {
    hoverLeave(_hoveredLayer);
  }
});

/* ================================================================
   STATE — выделение (сбрасывается при смене вкладки)
   ================================================================ */

let selectedCountryLayer = null;
let selectedRegionLayer  = null;
let selectedMarker       = null;

function clearSelection() {
  if (selectedCountryLayer) { selectedCountryLayer.setStyle(STYLE.countryVisited); selectedCountryLayer = null; }
  if (selectedRegionLayer)  { selectedRegionLayer.setStyle(STYLE.regionVisited);   selectedRegionLayer  = null; }
  if (selectedMarker)       { selectedMarker.setIcon(PIN_VISITED);                 selectedMarker       = null; }
  document.querySelectorAll(".ctag.active").forEach(t => t.classList.remove("active"));
}

/* ================================================================
   SIDEBAR
   ================================================================ */

const visitedSet = new Set(
  MAP_CONFIG.visited.map(c => nid(MAP_CONFIG.A2N[c.toUpperCase()] || 0)).filter(v => v !== "0")
);

function showMode(mode) {
  if (activeMode === mode) return;
  activeMode = mode;
  clearSelection();
  history.replaceState({}, "", "?mode=" + mode);
  renderTabs();
  renderSidebarList(mode);
}

function renderSidebarList(mode) {
  const isWorld  = mode === "world";
  const items    = isWorld ? MAP_CONFIG.visited : MAP_CONFIG.cities;
  const count    = isWorld ? visitedSet.size : items.length;

  document.getElementById("hTitle").textContent     = isWorld ? "Карта путешествий" : "Города России";
  document.getElementById("vsLabel").textContent    = isWorld ? "Посещённые страны"  : "Посещённые города";
  document.getElementById("hCountLabel").textContent = isWorld ? "стран" : "городов";
  document.getElementById("hCount").textContent     = count;
  document.getElementById("hTotal").textContent     = isWorld ? 195 : "156+";
  document.getElementById("hBadge").style.display   = count ? "flex" : "none";
  document.getElementById("visitedSection").style.display = count ? "flex" : "none";

  const list = document.getElementById("visitedList");
  list.innerHTML = "";

  if (isWorld) {
    for (const code of MAP_CONFIG.visited) {
      const tag = document.createElement("div");
      tag.className = "ctag";
      tag.dataset.key = code.toUpperCase();
      tag.setAttribute("role", "button"); tag.setAttribute("tabindex", "0");
      const f = document.createElement("span"); f.className = "ctag-flag"; f.textContent = flag(code);
      tag.appendChild(f);
      tag.appendChild(document.createTextNode(countryName(code)));
      tag.addEventListener("click", () => onCountryClick(tag));
      tag.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); tag.click(); } });
      list.appendChild(tag);
    }
  } else {
    for (const city of MAP_CONFIG.cities) {
      const tag = document.createElement("div");
      tag.className = "ctag";
      tag.dataset.key = city.name;
      tag.setAttribute("role", "button"); tag.setAttribute("tabindex", "0");
      const ic = document.createElement("span"); ic.className = "ctag-icon"; ic.textContent = "📍";
      tag.appendChild(ic);
      tag.appendChild(document.createTextNode(city.name));
      tag.addEventListener("click", () => onCityClick(tag));
      tag.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); tag.click(); } });
      list.appendChild(tag);
    }
  }
}

/* ================================================================
   INTERACTION — клики по стране
   ================================================================ */

let countryLayerByCode = {};

function onCountryClick(tag) {
  clearSelection();
  tag.classList.add("active");

  const code  = tag.dataset.key;
  const layer = countryLayerByCode[code];
  const cent  = MAP_CONFIG.CENTROIDS[code];

  if (layer) {
    layer.setStyle(STYLE.countrySelected);
    layer.bringToFront();
    selectedCountryLayer = layer;
    map.flyToBounds(layer.getBounds(), { padding: [40, 40], maxZoom: 6, duration: 0.6 });
  } else if (cent) {
    map.flyTo(cent, 6, { duration: 0.6 });
  }
}

/* ================================================================
   INTERACTION — клики по городу
   ================================================================ */

let regionLayerByName = {};
let markerByCityName  = {};

function onCityClick(tag) {
  clearSelection();
  tag.classList.add("active");

  const cityName    = tag.dataset.key;
  const city        = MAP_CONFIG.cities.find(c => c.name === cityName);
  if (!city) return;
  const marker      = markerByCityName[cityName];
  const regionLayer = regionLayerByName[city.region];

  if (marker)      { marker.setIcon(PIN_SELECTED);               selectedMarker      = marker; }
  if (regionLayer) { regionLayer.setStyle(STYLE.regionSelected); selectedRegionLayer = regionLayer; }

  map.flyTo([city.lat, city.lng], 7, { duration: 0.7 });
}

/* ================================================================
   GEO — слои карты (создаются один раз)
   ================================================================ */

function buildWorldLayers(worldTopo) {
  const geojson = topojson.feature(worldTopo, worldTopo.objects.countries);
  geojson.features.forEach(fixGeometry);

  // Один слой: visited — зелёный, остальные — прозрачные; hover и tooltip на одном слое
  L.geoJSON(geojson, {
    style: f => visitedSet.has(nid(f.id)) ? STYLE.countryVisited : STYLE.countryClear,
    onEachFeature(feature, layer) {
      const id = nid(feature.id), name = MAP_CONFIG.N2A[id];
      if (!name) return;
      const visited = visitedSet.has(id);
      const code = N2C[id];
      if (visited && code) countryLayerByCode[code] = layer;
      layer.bindTooltip(visited ? "✓ " + name : name, { sticky: true, className: visited ? "visited-tooltip" : "" });
      const restoreStyle = visited ? STYLE.countryVisited : STYLE.countryClear;
      layer.on({
        mouseover: e => { if (e.target !== selectedCountryLayer) hoverEnter(e.target, STYLE.countryHover); },
        mouseout:  e => { if (e.target !== selectedCountryLayer) hoverLeave(e.target, restoreStyle); },
      });
    },
  }).addTo(map);
}

function buildRussiaLayers(russiaGeojson) {
  const visitedRegions = new Set(MAP_CONFIG.cities.map(c => c.region));

  // Один слой: visited — тёмно-зелёный, остальные — прозрачные; hover и tooltip на одном слое
  L.geoJSON(russiaGeojson, {
    style: f => visitedRegions.has(f.properties.name) ? STYLE.regionVisited : STYLE.regionBase,
    onEachFeature(feature, layer) {
      const name = feature.properties.name;
      if (!name) return;
      const visited = visitedRegions.has(name);
      if (visited) regionLayerByName[name] = layer;
      layer.bindTooltip(visited ? "✓ " + name : name, { sticky: true, className: visited ? "visited-tooltip" : "" });
      const restoreStyle = visited ? STYLE.regionVisited : STYLE.regionBase;
      layer.on({
        mouseover: e => { if (e.target !== selectedRegionLayer) hoverEnter(e.target, STYLE.regionHover); },
        mouseout:  e => { if (e.target !== selectedRegionLayer) hoverLeave(e.target, restoreStyle); },
      });
    },
  }).addTo(map);

  // Маркеры городов
  const markersGroup = L.layerGroup().addTo(map);
  for (const city of MAP_CONFIG.cities) {
    const marker = L.marker([city.lat, city.lng], { icon: PIN_VISITED });
    marker.bindTooltip(city.name, { sticky: true, className: "visited-tooltip" });
    marker.addTo(markersGroup);
    markerByCityName[city.name] = marker;
  }
}

/* ================================================================
   BOOT
   ================================================================ */

renderTabs();
renderSidebarList(activeMode);

const loadMsg = document.getElementById("loadMsg");
let worldLoaded = false, russiaLoaded = false;

function onBothLoaded() {
  loadMsg.style.display = "none";
  // сбрасываем возможное состояние выделения, накопленное до загрузки
  clearSelection();
  renderSidebarList(activeMode);
}

fetch(MAP_CONFIG.worldGeoUrl)
  .then(r => r.json())
  .then(worldTopo => {
    buildWorldLayers(worldTopo);
    worldLoaded = true;
    if (russiaLoaded) onBothLoaded();
  })
  .catch(() => { loadMsg.textContent = "Ошибка загрузки карты мира."; });

fetch(MAP_CONFIG.russiaGeoUrl)
  .then(r => r.json())
  .then(russiaGeojson => {
    buildRussiaLayers(russiaGeojson);
    russiaLoaded = true;
    if (worldLoaded) onBothLoaded();
  })
  .catch(() => { loadMsg.textContent = "Ошибка загрузки регионов России."; });
</script>
</body>
</html>
